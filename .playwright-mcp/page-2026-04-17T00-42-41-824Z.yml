  - generic [ref=e103]:
    - text: Principles
    - heading "Culture Building Principles Within Culture Quest" [level=2] [ref=e104]
    - generic [ref=e105]:
      - generic [ref=e106]:
        - generic [ref=e107]: "01"
        - heading "Treat Culture as a Strategic Discipline" [level=3] [ref=e108]
        - paragraph [ref=e109]: Culture is the operating system that determines how effectively your business and project strategies are executed. Culture drives behavior and behavior drives business results. As a critical strategic asset, it demands the same rigor, priority, and disciplined approach as your financial, operational, and project plans.
      - generic [ref=e110]:
        - generic [ref=e111]: "02"
        - heading "Build Culture at the Team Level" [level=3] [ref=e112]
        - paragraph [ref=e113]: Company-wide culture initiatives often fail because they are too abstract. Real culture lives in teams — in daily interactions, decisions, and behaviors. Culture Quest builds from the ground up, giving each team ownership of their own culture plan.
      - generic [ref=e114]:
        - generic [ref=e115]: "03"
        - heading "Make it Human-Led" [level=3] [ref=e116]
        - paragraph [ref=e117]: Culture cannot be outsourced to surveys or AI agents. It must be built from the values, instincts, and lived experiences of the people doing the work. Culture Quest draws entirely from what your team already knows.
      - generic [ref=e118]:
        - generic [ref=e119]: "04"
        - heading "Make it Visible and Documented" [level=3] [ref=e120]
        - paragraph [ref=e121]: A culture that exists only in people’s heads is fragile. Culture Quest produces a documented Team Culture Plan — available online and in print — so every team member has a current copy and can hold each other accountable.
      - generic [ref=e122]:
        - generic [ref=e123]: "05"
        - heading "Build in Continuous Improvement" [level=3] [ref=e124]
        - paragraph [ref=e125]: Culture is not a one-time exercise. Culture Quest includes a defined process for reviewing, measuring, and updating the plan at least twice a year, ensuring the system grows with the team.
