  - generic [ref=e52]:
    - text: Vision
    - heading "Culture Plans Should Hold the Same Strategic Stature as Business Plans" [level=2] [ref=e53]
    - paragraph [ref=e54]: To achieve this, culture plans cannot be generic, top-down mandates. They must be built at the individual team level, where culture is lived and executed every day.
    - paragraph [ref=e55]: "A team's culture plan is only truly effective if every member can answer “yes” to five vital questions:"
    - list [ref=e56]:
      - listitem [ref=e57]:
        - generic [ref=e58]: "1"
        - paragraph [ref=e59]:
          - strong [ref=e60]: "Co-created:"
          - text: Was it built with input from every team member?
      - listitem [ref=e61]:
        - generic [ref=e62]: "2"
        - paragraph [ref=e63]:
          - strong [ref=e64]: "Documented:"
          - text: Does everyone have a current copy?
      - listitem [ref=e65]:
        - generic [ref=e66]: "3"
        - paragraph [ref=e67]:
          - strong [ref=e68]: "Framework:"
          - text: Was it developed using a rigorous model?
      - listitem [ref=e69]:
        - generic [ref=e70]: "4"
        - paragraph [ref=e71]:
          - strong [ref=e72]: "Measured:"
          - text: Is progress formally reviewed at least twice a year?
      - listitem [ref=e73]:
        - generic [ref=e74]: "5"
        - paragraph [ref=e75]:
          - strong [ref=e76]: "Current:"
          - text: Is it updated annually to reflect the team’s growth?
    - paragraph [ref=e77]: When every team in an organization can answer “yes,” culture transforms from an abstract concept into a tangible, competitive advantage.
  - generic [ref=e79]:
    - text: The Core Concept
    - heading "A Visible Blueprint for How Your Team Works" [level=2] [ref=e80]
    - paragraph [ref=e81]: Using the Culture Quest COS engine, a team defines the blueprint for their environment. It draws from the values, judgment, experiences, instincts, beliefs, and insights your team already has — not from surveys or AI agents. The result is a practical, step-by-step system any team can implement without special expertise.
